<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>StudySpace Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Login.css">
</head>

<body>

    <!-- Logo at top corner -->
    <div class="container">

        <img src="logo 1.jpeg" alt="Bit Buddy Logo" class="logo">


    <div class="container">
        <h1>StudySpace</h1>
        <p class="subtitle">Sign in to StudySpace</p>

        <button class="btn">Sign in with Google</button>
        <button class="btn">Sign in with Apple</button>

        <div class="divider">
            <hr>
            <span>or</span>
            <hr>
        </div>

        <input type="text" placeholder="Phone, email or username">

        <button class="next-btn">Next</button>
        <button class="forgot-btn">Forgot Password?</button>
    </div>

</body>
</html>
