<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — bitBuddy</title>
  <link rel="stylesheet" href="/css/global.css">
  <link rel="stylesheet" href="/css/login.css">
</head>
<body class="login-page">

  <div class="login-card">

    <div class="login-logo">
      <div class="bb-icon" style="width:44px;height:44px;font-size:18px;">bb</div>
      <span class="brand-name">bit<em>Buddy</em></span>
    </div>

    <h1>Welcome back 👋</h1>
    <p class="subtitle">Sign in to your study space</p>

    <button class="social-btn" id="btn-google">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Sign in with Google
    </button>

    <button class="social-btn" id="btn-apple">
      <svg viewBox="0 0 24 24" fill="black">
        <path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.7 9.05 7.42c1.39.07 2.36.74 3.18.8 1.21-.24 2.37-.93 3.67-.84 1.57.12 2.75.72 3.53 1.84-3.27 1.96-2.5 5.96.48 7.13-.57 1.5-1.32 2.98-2.86 3.93zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/>
      </svg>
      Sign in with Apple
    </button>

    <div class="divider">
      <hr><span>or</span><hr>
    </div>

    <div class="input-group">
      <input type="text" id="input-email" placeholder="Phone, email or username" autocomplete="username">
    </div>

    <button class="primary-btn" id="btn-next" style="margin-bottom:10px;">Next →</button>
    <button class="ghost-btn" id="btn-forgot">Forgot Password?</button>

    <p class="login-footer">
      Don't have an account? <a href="#" id="link-signup">Sign up free</a>
    </p>

  </div>

  <script src="/js/login.js"></script>
</body>
</html>
